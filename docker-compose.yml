services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-azorde}
      MYSQL_USER: ${MYSQL_USER:-azorde}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-azorde}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      PORT: 3000
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: ${MYSQL_USER:-azorde}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-azorde}
      DATABASE_NAME: ${MYSQL_DATABASE:-azorde}
      UPLOAD_DEST: /app/uploads
      TYPEORM_SYNC: "true"
      TYPEORM_LOGGING: "false"
      JWT_SECRET: ${JWT_SECRET:-azorde-jwt-altere-em-producao}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      SEED_ON_START: "true"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api

volumes:
  mysql_data:
  uploads_data:
